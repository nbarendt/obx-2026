<meta name="color-scheme" content="light">
<!-- Ask the browser to revalidate the page on each visit so a rebuilt guide shows
     up without a manual hard-refresh. (GitHub Pages' own CDN caches for ~10 min,
     which we can't change from here — so a fresh deploy can still take a few
     minutes to appear, but you shouldn't have to force-refresh after that.) -->
<meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
<meta name="description" content="Family guide — Kill Devil Hills, Outer Banks, NC. July 2026.">
